      <label>หลักฐานการจ่าย</label>
      <div id="payProofGallery_${sessionId}" style="margin:8px 0"></div>
      ${makeUploadBtn('payments', sessionId, 'payment', 'payProofGallery_'+sessionId, true)}
      <input type="text" id="pmProof" placeholder="หรือวาง URL / หมายเหตุ" style="margin-top:8px">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-primary" onclick="submitPayment('${sessionId}')">บันทึก</button>
    </div>
  `);
  renderPhotoGallery('payProofGallery_'+sessionId, sessionId, 'payments', true);
}

// ══════════════════════════════════════════════════════════════
// PDPA DASHBOARD PAGE
// ══════════════════════════════════════════════════════════════
async function renderPdpa() {
  const el = document.getElementById('pageContent');

  // Non-admin: show personal PDPA options
  if (APP.role !== 'admin') {
    const status = await apiRaw('getConsentStatus', {});
    el.innerHTML = `
      <div class="page-heading" style="margin-bottom:20px">🛡️ ความเป็นส่วนตัวของฉัน</div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-title" style="margin-bottom:12px">สถานะความยินยอม</div>
        <div class="flex items-center gap-2" style="margin-bottom:8px">
          <span class="badge ${status.hasConsent?'badge-success':'badge-danger'}">
            ${status.hasConsent?'✅ ให้ความยินยอมแล้ว':'❌ ยังไม่ให้ความยินยอม'}
          </span>
          ${status.grantedAt?`<span class="text-muted text-sm">เมื่อ ${status.grantedAt.split('T')[0]}</span>`:''}
        </div>
        ${!status.hasConsent?`<button class="btn-primary btn-sm" onclick="showConsentModal(()=>location.reload())">ให้ความยินยอม</button>`:''}
      </div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-title" style="margin-bottom:12px">สิทธิ์ของคุณตาม PDPA</div>
        <div class="form-group">
          <button class="btn-secondary" style="width:100%;margin-bottom:8px" onclick="exportMyDataUI()">
            📥 Export ข้อมูลส่วนตัวทั้งหมด
          </button>
          <button class="btn-danger" style="width:100%" onclick="requestErasureUI()">
            🗑 ขอลบข้อมูลส่วนตัว (Right to Erasure)
          </button>
        </div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">นโยบายความเป็นส่วนตัว</div>
        <div id="policyDisplay" class="pdpa-policy-text text-sm"></div>
      </div>`;
    apiRaw('getPdpaPolicy', {}).then(p => {
      const el2 = document.getElementById('policyDisplay');
      if (el2 && p.content) el2.innerHTML = p.content;
    });
    return;
  }

  // Admin: full dashboard
  const data = await apiRaw('getPdpaDashboard', {});
  if (!data || data.error) { el.innerHTML = '<p class="text-muted">ไม่สามารถโหลดข้อมูลได้</p>'; return; }

  const s = data.summary || {};
  el.innerHTML = `
    <div class="page-header">
      <div class="page-heading">🛡️ PDPA Dashboard</div>
    </div>

    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${s.totalUsers||0}</div><div class="stat-label">ผู้ใช้ทั้งหมด</div></div>
      <div class="stat-card" style="border-color:var(--c-success)"><div class="stat-icon">✅</div><div class="stat-value" style="color:var(--c-success)">${s.consentGranted||0}</div><div class="stat-label">ให้ความยินยอมแล้ว</div></div>
      <div class="stat-card" style="border-color:var(--c-warning)"><div class="stat-icon">⚠️</div><div class="stat-value" style="color:var(--c-warning)">${s.noConsent||0}</div><div class="stat-label">ยังไม่ให้ความยินยอม</div></div>
      <div class="stat-card" style="border-color:var(--c-danger)"><div class="stat-icon">📋</div><div class="stat-value" style="color:var(--c-danger)">${s.pendingRequests||0}</div><div class="stat-label">คำขอรอดำเนินการ</div></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchPdpaTab(this,'pdpaRequests')">คำขอ PDPA (${s.pendingRequests||0})</button>
      <button class="tab-btn" onclick="switchPdpaTab(this,'pdpaConsents')">✅ Consent แล้ว (${s.consentGranted||0})</button>
      <button class="tab-btn" onclick="switchPdpaTab(this,'pdpaNoConsent')">⚠️ ยังไม่ยินยอม (${s.noConsent||0})</button>
      <button class="tab-btn" onclick="switchPdpaTab(this,'pdpaAccessLog')">Access Log</button>
    </div>

    <div id="pdpaRequests">
      ${!arr(data.pendingRequests).length
        ? '<p class="text-muted" style="padding:20px">ไม่มีคำขอที่รอดำเนินการ</p>'
        : `<div class="table-wrap"><table><thead><tr>
            <th>ผู้ขอ</th><th>ประเภท</th><th>เหตุผล</th><th>วันที่ขอ</th><th>Actions</th>
          </tr></thead><tbody>
          ${arr(data.pendingRequests).map(r=>`<tr>
            <td class="font-bold">${r.userName||r.userId}</td>
            <td><span class="badge badge-warning">${r.requestType}</span></td>
            <td>${r.reason||'-'}</td>
            <td>${(r.requestedAt||'').split('T')[0]}</td>
            <td class="flex gap-2">
              <button class="btn-primary btn-sm" onclick="processRequest('${r.id}','approve')">✅ อนุมัติ</button>
              <button class="btn-danger btn-sm" onclick="processRequest('${r.id}','reject')">❌ ปฏิเสธ</button>
            </td>
          </tr>`).join('')}
          </tbody></table></div>`}
    </div>

    <div id="pdpaConsents" class="hidden">
      ${!arr(data.allConsents).filter(c=>c.status==='granted').length
        ? '<p class="text-muted" style="padding:20px">ยังไม่มีผู้ใช้ที่ให้ความยินยอม</p>'
        : `<div class="table-wrap"><table><thead><tr>
            <th>ผู้ใช้</th><th>สถานะ</th><th>Policy Version</th><th>วันที่ยินยอม</th>
          </tr></thead><tbody>
          ${arr(data.allConsents).map(c=>`<tr>
            <td style="font-weight:600">${c.userName||c.userId||'-'}</td>
            <td><span class="badge ${c.status==='granted'?'badge-success':c.status==='revoked'?'badge-muted':'badge-danger'}">
              ${c.status==='granted'?'✅ ยินยอม':c.status==='revoked'?'🔒 ถูกเพิกถอน':'❌ ปฏิเสธ'}
            </span></td>
            <td><span class="badge badge-muted">v${c.version||'-'}</span></td>
            <td style="color:var(--c-muted);font-size:0.82rem">${(c.grantedAt||'').split('T')[0]||'-'}</td>
          </tr>`).join('')}
          </tbody></table></div>`}
    </div>

    <div id="pdpaNoConsent" class="hidden">
      ${!arr(data.noConsentUsers).length
        ? '<p class="text-muted" style="padding:20px">ผู้ใช้ทุกคนให้ความยินยอมแล้ว ✅</p>'
        : `<div class="table-wrap"><table><thead><tr><th>ชื่อ</th><th>อีเมล</th><th>บทบาท</th></tr></thead><tbody>
          ${arr(data.noConsentUsers).map(u=>`<tr>
            <td>${u.name}</td><td>${u.email}</td>
            <td><span class="badge badge-muted">${u.role}</span></td>
          </tr>`).join('')}
          </tbody></table></div>`}
    </div>

    <div id="pdpaAccessLog" class="hidden">
      <div class="table-wrap"><table><thead><tr>
        <th>เวลา</th><th>ผู้ใช้</th><th>Action</th><th>ประเภทข้อมูล</th><th>Target</th>
      </tr></thead><tbody>
      ${arr(data.recentLogs).map(l=>`<tr>
        <td class="text-muted text-sm">${(l.accessedAt||'').replace('T',' ').split('.')[0]}</td>
        <td>${l.userId}</td>
        <td><span class="badge ${l.action==='DELETE_PHOTO'||l.action==='ERASURE_APPROVED'?'badge-danger':l.action==='UPLOAD'?'badge-primary':'badge-muted'}">${l.action}</span></td>
        <td>${l.dataType||'-'}</td>
        <td class="text-muted text-sm">${l.targetId||'-'}</td>
      </tr>`).join('')}
      </tbody></table></div>
    </div>`;
}

function switchPdpaTab(btn, which) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['pdpaRequests','pdpaConsents','pdpaNoConsent','pdpaAccessLog'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('hidden', id !== which);
  });
}

async function processRequest(requestId, action) {
  let notes;
  if (action === 'approve') {
    notes = prompt('หมายเหตุการอนุมัติ (ถ้ามี):');
    if (notes === null) return; // user กด Cancel
    notes = notes || '';
  } else {
    notes = prompt('เหตุผลการปฏิเสธ (จำเป็น):');
    if (notes === null) return; // user กด Cancel
    if (!notes.trim()) { toast('กรุณาระบุเหตุผลการปฏิเสธ', 'error'); return; }
  }
  const r = await apiRaw('processErasureRequest', { requestId, action, notes });
  if (r.error) { toast(r.error, 'error'); return; }
  toast(action === 'approve' ? 'อนุมัติและลบข้อมูลแล้ว' : 'ปฏิเสธคำขอแล้ว');
  renderPdpa();
}

async function exportMyDataUI() {
  toast('⏳ กำลัง Export ข้อมูล...');
  const data = await apiRaw('exportMyData', {});
  if (!data || data.error) { toast('Export ไม่สำเร็จ', 'error'); return; }
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `my_data_${new Date().toISOString().split('T')[0]}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('Export สำเร็จ ดาวน์โหลดแล้ว ✓');
}

async function requestErasureUI() {
  const reason = prompt('กรุณาระบุเหตุผลในการขอลบข้อมูล:');
  if (!reason) return;
  if (!confirm('ยืนยันขอลบข้อมูลส่วนตัวทั้งหมด? Admin จะตรวจสอบและดำเนินการภายใน 30 วัน')) return;
  const r = await apiRaw('requestDataErasure', { reason });
  toast(r.message || 'ส่งคำขอแล้ว');
}
</script>
